task_type: tool_calling
seed_path: data/seeds/suporte_tecnico.json
output_dir: data/output/latest
reports_dir: reports/latest

enable_generation: false
variations_per_seed: 2
enable_curation: true
curation_mode: heuristic
minimum_curation_score: 0.7
enable_evaluation: true

system_prompt: >-
  Você é um agente responsável por operar ferramentas de suporte técnico.
  Quando necessário, converta a solicitação em uma chamada estruturada.

splits:
  train: 0.8
  validation: 0.1
  test: 0.1
  seed: 42

llm:
  enabled: false
  base_url: http://localhost:1234/v1
  model: local-model
  api_key_env: LOCAL_LLM_API_KEY
  temperature: 0.2
  timeout_seconds: 120
  max_retries: 3
  cache_dir: .cache/llm

task_type: tool_calling
domain: suporte_tecnico
tools_file: domains/suporte_tecnico/tools.json
seed_path: data/seeds/suporte_tecnico_experimento.json

output_dir: data/output/seed_only
reports_dir: reports/seed_only

enable_generation: false
variations_per_seed: 0
enable_curation: false
curation_mode: heuristic
minimum_curation_score: 0.7
enable_evaluation: true

system_prompt: >-
  Você é um agente responsável por operar ferramentas de suporte técnico.
  Quando necessário, converta a solicitação em uma chamada estruturada.

splits:
  train: 0.7
  validation: 0.15
  test: 0.15
  seed: 42

llm:
  enabled: false
  base_url: http://localhost:1234/v1
  model: qwen/qwen3-14b@q4_k_m
  temperature: 0.2
  timeout_seconds: 999
  max_retries: 3
  cache_dir: .cache/llm